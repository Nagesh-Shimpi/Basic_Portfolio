<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagesh</title>
    <style>
        /* --- RESET & BASE STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto Mono', monospace; /* Mono font for pro feel */
        }

        body {
            overflow: hidden;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #121212;
        }

        /* --- DYNAMIC BACKGROUND --- */
        .bg-video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a2e, #16213e, #0f3460);
            background-size: 200% 200%;
            animation: deepSpace 15s ease infinite;
        }

        @keyframes deepSpace {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- HEADER --- */
        header {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(10px);
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(66, 245, 191, 0.2);
            z-index: 10;
        }

        header h1 {
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff;
        }

        header .highlight { color: #42f5bf; font-weight: bold; text-shadow: 0 0 10px rgba(66, 245, 191, 0.5); }
        header .sub-info { font-size: 0.8rem; color: #888; }

        /* --- MAIN LAYOUT --- */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 260px 1fr 350px; /* Adjusted col widths */
            gap: 15px;
            padding: 15px;
            height: calc(100vh - 50px);
        }

        /* --- GLASS PANELS --- */
        .glass-panel {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .panel-header {
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            color: #42f5bf;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* --- CONTROLS (LEFT) --- */
        .controls-content { padding: 15px; overflow-y: auto; }
        
        .btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            text-align: left;
            font-size: 0.85rem;
        }

        .btn:hover, .btn.active {
            background: rgba(66, 245, 191, 0.1);
            color: #42f5bf;
            border-color: #42f5bf;
            padding-left: 15px;
        }

        .input-group { margin: 20px 0; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 0.8rem; color: #888; }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
            margin-bottom: 10px;
        }

        button.action-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #00b09b, #96c93d);
            border: none;
            border-radius: 6px;
            color: #111;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 176, 155, 0.4);
            transition: transform 0.2s;
        }
        button.action-btn:active { transform: scale(0.98); }
        button.action-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

        /* --- VISUALIZER (CENTER) --- */
        .visualizer-container {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 20px;
            gap: 2px;
            position: relative;
        }

        .bar {
            background: #4a4a4a;
            border-radius: 4px 4px 0 0;
            transition: height 0.2s ease;
            position: relative;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        
        .bar.active { background: #42f5bf; box-shadow: 0 0 15px #42f5bf; } /* Select/Pointer */
        .bar.compare { background: #ffeb3b; } /* Comparison */
        .bar.swap { background: #ff5252; }    /* Swapping */
        .bar.sorted { background: #2196f3; }  /* Final sorted state */

        .status-log {
            position: absolute;
            top: 20px;
            left: 20px;
            font-family: 'Consolas', monospace;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
        }

        /* --- CODE PANEL (RIGHT) --- */
        .code-container {
            flex: 1;
            background: #111;
            overflow-y: auto;
            padding: 10px 0;
            font-family: 'Consolas', monospace;
            font-size: 0.8rem;
            border-top: 1px solid #333;
        }

        .code-line {
            padding: 2px 15px;
            color: #666;
            display: flex;
            transition: background 0.1s;
        }
        
        .code-line .line-num {
            width: 25px;
            color: #444;
            user-select: none;
            text-align: right;
            margin-right: 15px;
        }

        .code-line .line-text { color: #aaa; white-space: pre; }

        /* The Magic Highlighting Class */
        .code-line.highlight-exec {
            background: rgba(66, 245, 191, 0.15);
            border-left: 3px solid #42f5bf;
        }
        .code-line.highlight-exec .line-text { color: #fff; font-weight: bold; }

        .complexity-info {
            padding: 15px;
            background: rgba(255,255,255,0.02);
            font-size: 0.8rem;
            color: #888;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="bg-video-container"></div>

    <header>
        <div>
            <h1>Code Visualizer<span class="highlight">PRO</span></h1>
            <span class="sub-info">Created by Nagesh | USN 3PD24CS122</span>
        </div>
        <div class="sub-info">Guided by POOJA MAM</div>
    </header>

    <main>
        <section class="glass-panel">
            <div class="panel-header">Configuration</div>
            <div class="controls-content">
                <label style="color:#666; font-size:0.75rem; display:block; margin-bottom:5px;">SELECT ALGORITHM</label>
                <div id="algo-buttons">
                    <button class="btn active" onclick="setAlgo('insertion')">Insertion Sort</button>
                    <button class="btn" onclick="setAlgo('quick')">Quick Sort</button>
                    <button class="btn" onclick="setAlgo('radix')">Radix Sort</button>
                </div>

                <div class="input-group">
                    <label>DATA SET (Comma separated)</label>
                    <input type="text" id="userInput" value="45, 12, 8, 90, 3, 50, 22" placeholder="Input numbers...">
                    
                    <label style="margin-top:15px;">EXECUTION SPEED (ms)</label>
                    <input type="range" id="speedInput" min="20" max="1000" value="400" style="width:100%; accent-color: #42f5bf;">
                </div>

                <button class="action-btn" onclick="startSort()">RUN VISUALIZATION</button>
                <button class="btn" style="margin-top:10px; text-align:center;" onclick="generateRandom()">Randomize Data</button>
            </div>
        </section>

        <section class="glass-panel">
            <div class="panel-header">Visualization Engine</div>
            <div class="visualizer-container" id="container">
                <div class="status-log" id="statusLog">// Ready to start...</div>
            </div>
        </section>

        <section class="glass-panel">
            <div class="panel-header">Live Execution Logic</div>
            <div class="code-container" id="codeDisplay">
                </div>
            <div class="complexity-info" id="complexityDisplay">
                </div>
        </section>
    </main>

    <script>
        // --- DATA & STATE ---
        let array = [];
        let delay = 400;
        let currentAlgo = 'insertion';
        const container = document.getElementById('container');
        const codeDisplay = document.getElementById('codeDisplay');
        const statusLog = document.getElementById('statusLog');
        
        // --- ALGORITHM DATA (Code Lines + Logic) ---
        // NOTE: These are lines of C code broken into arrays for highlighting
        const algoData = {
            insertion: {
                lines: [
                    "void insertionSort(int arr[], int n) {",
                    "    int i, key, j;",
                    "    for (i = 1; i < n; i++) {",
                    "        key = arr[i];",
                    "        j = i - 1;",
                    "        while (j >= 0 && arr[j] > key) {",
                    "            arr[j + 1] = arr[j];",
                    "            j = j - 1;",
                    "        }",
                    "        arr[j + 1] = key;",
                    "    }",
                    "}"
                ],
                complexity: "Time: O(n^2) | Space: O(1)"
            },
            quick: {
                lines: [
                    "/* Partition Logic */",
                    "int partition(int arr[], int low, int high) {",
                    "    int pivot = arr[high];",
                    "    int i = (low - 1);",
                    "    for (int j = low; j <= high - 1; j++) {",
                    "        if (arr[j] < pivot) {",
                    "            i++;",
                    "            swap(&arr[i], &arr[j]);",
                    "        }",
                    "    }",
                    "    swap(&arr[i + 1], &arr[high]);",
                    "    return (i + 1);",
                    "}"
                ],
                complexity: "Time: O(n log n) | Space: O(log n)"
            },
            radix: {
                lines: [
                    "void countSort(int arr[], int n, int exp) {",
                    "    int output[n];",
                    "    int count[10] = { 0 };",
                    "    for (i = 0; i < n; i++)",
                    "        count[(arr[i] / exp) % 10]++;",
                    "    for (i = 1; i < 10; i++)",
                    "        count[i] += count[i - 1];",
                    "    for (i = n - 1; i >= 0; i--) {",
                    "        output[count[...] - 1] = arr[i];",
                    "        count[...]--;",
                    "    }",
                    "    for (i = 0; i < n; i++) arr[i] = output[i];",
                    "}"
                ],
                complexity: "Time: O(nk) | Space: O(n + k)"
            }
        };

        // --- INIT ---
        window.onload = () => {
            setAlgo('insertion');
            generateRandom();
        };

        // --- UI FUNCTIONS ---
        function setAlgo(algo) {
            currentAlgo = algo;
            // Buttons
            document.querySelectorAll('#algo-buttons .btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            // Render Code
            renderCode(algoData[algo].lines);
            document.getElementById('complexityDisplay').innerText = algoData[algo].complexity;
        }

        function renderCode(lines) {
            codeDisplay.innerHTML = '';
            lines.forEach((text, index) => {
                const row = document.createElement('div');
                row.className = 'code-line';
                row.id = `line-${index}`; // ID for highlighting
                row.innerHTML = `<div class="line-num">${index + 1}</div><div class="line-text">${text}</div>`;
                codeDisplay.appendChild(row);
            });
        }

        function highlightLine(lineIndex) {
            // Remove old highlights
            document.querySelectorAll('.code-line').forEach(el => el.classList.remove('highlight-exec'));
            // Add new
            const el = document.getElementById(`line-${lineIndex}`);
            if(el) {
                el.classList.add('highlight-exec');
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function log(msg) {
            statusLog.innerText = `// ${msg}`;
        }

        function generateRandom() {
            let randArr = [];
            for(let i=0; i<10; i++) randArr.push(Math.floor(Math.random() * 90) + 10);
            document.getElementById('userInput').value = randArr.join(', ');
            parseInput();
        }

        function parseInput() {
            const input = document.getElementById('userInput').value;
            array = input.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
            renderBars();
        }

        function renderBars(indices = {}, state = 'idle') {
            container.innerHTML = '';
            container.appendChild(statusLog); // Keep log inside
            const maxVal = Math.max(...array, 100);

            array.forEach((val, i) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${(val/maxVal)*80}%`;
                bar.style.width = array.length > 15 ? '20px' : '40px';
                
                // Color Logic
                if (state === 'sorted') bar.classList.add('sorted');
                else if (indices.swap && indices.swap.includes(i)) bar.classList.add('swap');
                else if (indices.compare && indices.compare.includes(i)) bar.classList.add('compare');
                else if (indices.active && indices.active.includes(i)) bar.classList.add('active');

                // Text Label
                if(array.length < 20) {
                    const num = document.createElement('div');
                    num.innerText = val;
                    num.style.position = 'absolute';
                    num.style.bottom = '-25px';
                    num.style.left = '50%';
                    num.style.transform = 'translateX(-50%)';
                    num.style.color = '#fff';
                    num.style.fontSize = '0.7rem';
                    bar.appendChild(num);
                }
                container.appendChild(bar);
            });
        }

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // --- CORE RUNNER ---
        async function startSort() {
            parseInput();
            delay = document.getElementById('speedInput').value;
            const btn = document.querySelector('.action-btn');
            btn.disabled = true;

            if (currentAlgo === 'insertion') await insertionSort();
            else if (currentAlgo === 'quick') await quickSort(0, array.length - 1);
            else if (currentAlgo === 'radix') await radixSort();

            renderBars({}, 'sorted');
            highlightLine(-1); // Clear code highlight
            log("Sorting Complete.");
            btn.disabled = false;
        }

        // --- INSERTION SORT (Synced) ---
        async function insertionSort() {
            // Mapped to algoData.insertion.lines
            highlightLine(0); await sleep(delay/2);
            
            for (let i = 1; i < array.length; i++) {
                highlightLine(2); // for loop
                log(`Iteration ${i}: Selecting ${array[i]}`);
                renderBars({active: [i]}); 
                await sleep(delay);

                let key = array[i];
                highlightLine(3); // key = arr[i]
                
                let j = i - 1;
                highlightLine(4); // j = i - 1

                while (j >= 0 && array[j] > key) {
                    highlightLine(5); // while check
                    log(`Comparing ${array[j]} > ${key} ? True`);
                    renderBars({compare: [j], active: [i]}); // Show comparison
                    await sleep(delay);

                    array[j + 1] = array[j];
                    highlightLine(6); // shift
                    log(`Shifting ${array[j]} right`);
                    renderBars({swap: [j+1], active: [i]}); // Show shift
                    await sleep(delay);

                    j = j - 1;
                    highlightLine(7); // decrement j
                }
                
                highlightLine(5); // Final check fail
                await sleep(delay/2);

                array[j + 1] = key;
                highlightLine(9); // Insert
                log(`Inserting ${key} at index ${j+1}`);
                renderBars({sorted: [j+1]});
                await sleep(delay);
            }
        }

        // --- QUICK SORT (Synced to Partition View) ---
        async function partition(low, high) {
            highlightLine(1); // function definition
            let pivot = array[high];
            highlightLine(2); // pivot
            log(`Pivot selected: ${pivot}`);
            renderBars({active: [high]});
            await sleep(delay);

            let i = (low - 1);
            highlightLine(3); // i = low - 1

            for (let j = low; j <= high - 1; j++) {
                highlightLine(4); // loop
                
                highlightLine(5); // if check
                log(`Comparing ${array[j]} < ${pivot} ?`);
                renderBars({compare: [j], active: [high]});
                await sleep(delay);

                if (array[j] < pivot) {
                    i++;
                    highlightLine(6); // i++
                    
                    highlightLine(7); // swap
                    log(`Swapping ${array[i]} and ${array[j]}`);
                    [array[i], array[j]] = [array[j], array[i]];
                    renderBars({swap: [i, j], active: [high]});
                    await sleep(delay);
                }
            }
            highlightLine(10); // final swap
            [array[i + 1], array[high]] = [array[high], array[i + 1]];
            renderBars({swap: [i+1, high]});
            await sleep(delay);
            
            highlightLine(11); // return
            return (i + 1);
        }

        async function quickSort(low, high) {
            if (low < high) {
                let pi = await partition(low, high);
                await quickSort(low, pi - 1);
                await quickSort(pi + 1, high);
            }
        }

        // --- RADIX SORT (Synced) ---
        // Simplified visual logic for clarity
        async function radixSort() {
            let max = Math.max(...array);
            for (let exp = 1; Math.floor(max / exp) > 0; exp *= 10) {
                log(`Sorting by digit place: ${exp}`);
                highlightLine(0); 
                await countSortSync(exp);
            }
        }

        async function countSortSync(exp) {
            let output = new Array(array.length).fill(0);
            let count = new Array(10).fill(0);

            // Frequency count
            highlightLine(3); // loop count
            for (let i = 0; i < array.length; i++) {
                highlightLine(4);
                renderBars({active: [i]});
                count[Math.floor(array[i] / exp) % 10]++;
                await sleep(delay/4);
            }

            for (let i = 1; i < 10; i++) count[i] += count[i - 1];

            // Build output
            highlightLine(7); // reverse loop
            for (let i = array.length - 1; i >= 0; i--) {
                highlightLine(8); // set output
                output[count[Math.floor(array[i] / exp) % 10] - 1] = array[i];
                count[Math.floor(array[i] / exp) % 10]--;
            }

            // Copy back
            highlightLine(11); // copy loop
            for (let i = 0; i < array.length; i++) {
                array[i] = output[i];
                log(`Overwriting index ${i} with ${array[i]}`);
                renderBars({swap: [i]}); // visualize overwrite
                await sleep(delay/2);
            }
        }
    </script>
</body>
</html>
